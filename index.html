<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>감사해U 🌱 밀알복지재단</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{font-family:'Noto Sans KR',sans-serif;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:linear-gradient(145deg,#e8f5e9 0%,#f0fdf4 40%,#e0f7fa 100%);min-height:100vh}
    .glass{background:rgba(255,255,255,0.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.85)}
    .btn-g{background:linear-gradient(135deg,#2d7a4f 0%,#5bc490 100%);color:#fff;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
    .btn-g:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(45,122,79,.35)}
    .btn-g:active:not(:disabled){transform:translateY(0)}
    .btn-g:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
    .fade{animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    .shake{animation:shake .4s ease}
    @keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    .pop{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both}
    #confetti-cvs{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#5bc490;border-radius:2px}
    .chk-wrap input[type=checkbox]{display:none}
    .chk-wrap label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:11px 14px;border-radius:13px;border:2px solid #e5e7eb;transition:all .18s;background:#fff}
    .chk-wrap input:checked+label{border-color:#2d7a4f;background:#f0fdf4}
    .chk-box{width:20px;height:20px;min-width:20px;border-radius:6px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;transition:all .18s;background:#fff;margin-top:1px}
    .chk-wrap input:checked+label .chk-box{background:#2d7a4f;border-color:#2d7a4f}
    .fixed-footer{position:fixed;bottom:0;left:0;width:100%;text-align:center;padding:10px;font-size:11px;color:#9ca3af;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);z-index:50}
  </style>
</head>
<body>
<canvas id="confetti-cvs"></canvas>
<div id="root"></div>

<script type="text/babel">
// ================================================================
// ⚙️  배포 전 반드시 수정하세요!
// ================================================================
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxy4ks_0bw6n_A8s6vgQXX70eiAIuQ9cy8h_tIkJCNNVEWpr2Xd4T9G-qWikgMtwt-wiA/exec";
const STAFF = ["인재경영실 노민정 간사", "인재경영실 김진일 간사"]; // 여기에 전체 명단 삽입
// ================================================================

const PW       = "0715";
const MAX_SEND = 3;
const BASE_T   = 36.5;

const TMPLS = [
  "바쁠 때 먼저 손 내밀고 도와주셔서 감사해요.",
  "밝은 인사와 긍정적인 에너지로 힘이 되어주셔서 감사해요.",
  "기꺼이 고민을 들어주고 든든한 의지가 되어주셔서 감사해요.",
  "늘 친절하고 따뜻한 태도로 배려해 주셔서 감사해요.",
  "작은 부분까지 놓치지 않고 세심하게 챙겨주셔서 감사해요.",
  "묵묵히 제 몫을 다하며 든든하게 자리를 지켜주셔서 감사해요.",
  "언제나 변함없이 함께해 주셔서 큰 위로와 힘이 돼요.",
];

const {useState,useEffect,useRef,useCallback} = React;

/* ──────────── CONFETTI ──────────── */
function launchConfetti(){
  const cvs=document.getElementById('confetti-cvs');
  const ctx=cvs.getContext('2d');
  cvs.width=window.innerWidth; cvs.height=window.innerHeight;
  const cols=['#2d7a4f','#5bc490','#a7f3d0','#fbbf24','#f472b6','#60a5fa','#fb923c','#fff'];
  const pts=Array.from({length:180},()=>({
    x:Math.random()*cvs.width, y:cvs.height*Math.random()*-.5-10,
    w:Math.random()*11+4, h:Math.random()*7+3,
    c:cols[Math.floor(Math.random()*cols.length)],
    vx:(Math.random()-.5)*5, vy:Math.random()*3+2,
    rot:Math.random()*360, vr:(Math.random()-.5)*12, op:1
  }));
  let start=Date.now(), raf;
  (function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    const el=Date.now()-start;
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=.04; p.rot+=p.vr;
      p.op=el>2200?Math.max(0,1-(el-2200)/1100):1;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.op;ctx.fillStyle=p.c;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    if(el<3600){raf=requestAnimationFrame(draw);}
    else ctx.clearRect(0,0,cvs.width,cvs.height);
  })();
}

/* ──────────── THERMOMETER ──────────── */
function Thermometer({temp}){
  const mn=36.5, mx=120, TH=140;
  const pct=Math.min(1,Math.max(0,(temp-mn)/(mx-mn)));
  const filled=TH*pct;
  const col=temp<60?'#5bc490':temp<80?'#fbbf24':'#ef4444';
  const marks=[{t:36.5,l:'36.5'},{t:70,l:'70'},{t:100,l:'100'}];
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
      <svg width="56" height="210" viewBox="0 0 56 210">
        {/* tube shadow */}
        <rect x="19" y="14" width="18" height={TH+12} rx="9" fill="rgba(0,0,0,.07)"/>
        {/* tube bg */}
        <rect x="22" y="16" width="12" height={TH} rx="6" fill="#e5e7eb"/>
        {/* fill */}
        <rect x="22" y={16+(TH-filled)} width="12" height={Math.max(0,filled)} rx="6" fill={col} style={{transition:'all .9s ease'}}/>
        {/* bulb */}
        <circle cx="28" cy={TH+32} r="17" fill={col} style={{transition:'fill .9s ease'}} opacity=".3"/>
        <circle cx="28" cy={TH+32} r="13" fill={col} style={{transition:'fill .9s ease'}}/>
        {/* ticks */}
        {marks.map(m=>{
          const y=16+TH-(TH*(m.t-mn)/(mx-mn));
          return <g key={m.t}>
            <line x1="35" y1={y} x2="42" y2={y} stroke="#9ca3af" strokeWidth="1.5"/>
            <text x="44" y={y+4} fontSize="7" fill="#9ca3af">{m.l}</text>
          </g>
        })}
        {/* current line */}
        <line x1="18" y1={16+(TH-filled)} x2="36" y2={16+(TH-filled)} stroke={col} strokeWidth="1.5" strokeDasharray="2 2" opacity=".8"/>
      </svg>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:30,fontWeight:800,color:col,lineHeight:1,transition:'color .9s'}}>{temp.toFixed(1)}°</div>
        <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>나의 온도</div>
      </div>
    </div>
  );
}

/* ──────────── PASSWORD SCREEN ──────────── */
function PasswordScreen({onOk}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [shk,setShk]=useState(false);
  const go=()=>{
    if(pw===PW){onOk();}
    else{setErr('비밀번호가 틀렸습니다.');setShk(true);setPw('');setTimeout(()=>setShk(false),500);}
  };
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div className="glass fade pop" style={{borderRadius:26,padding:'44px 32px',width:'100%',maxWidth:360,textAlign:'center',boxShadow:'0 10px 40px rgba(45,122,79,.18)'}}>
        <div style={{fontSize:56,marginBottom:6}}>🌱</div>
        <h1 style={{margin:0,fontSize:30,fontWeight:800,color:'#2d7a4f'}}>감사해U</h1>
        <p style={{margin:'6px 0 30px',color:'#6b7280',fontSize:13}}>밀알복지재단 교육문화팀</p>
        <div className={shk?'shake':''}>
          <input
            type="password" value={pw}
            onChange={e=>{setPw(e.target.value);setErr('');}}
            onKeyDown={e=>e.key==='Enter'&&go()}
            placeholder="사내 비밀번호 입력"
            style={{width:'100%',padding:'14px 16px',borderRadius:13,border:'2px solid #d1d5db',fontSize:18,outline:'none',textAlign:'center',letterSpacing:6,marginBottom:6,transition:'border .2s'}}
            onFocus={e=>e.target.style.borderColor='#5bc490'}
            onBlur={e=>e.target.style.borderColor='#d1d5db'}
          />
          {err&&<p style={{color:'#ef4444',fontSize:13,margin:'4px 0 6px'}}>{err}</p>}
        </div>
        <button className="btn-g" onClick={go} style={{width:'100%',padding:15,borderRadius:13,fontSize:16,fontWeight:700,marginTop:8}}>
          입장하기 ✨
        </button>
      </div>
      <div className="fixed-footer">Supported by 밀알디아코니아연구소</div>
    </div>
  );
}

/* ──────────── LOGIN (NAME SELECT) ──────────── */
function LoginScreen({onSelect,loading}){
  const [q,setQ]=useState('');
  const list=(q?STAFF.filter(n=>n.includes(q)):STAFF).slice(0,30);
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'44px 20px 80px'}}>
      <div className="glass fade" style={{borderRadius:24,padding:'30px 22px',width:'100%',maxWidth:420,boxShadow:'0 8px 32px rgba(45,122,79,.15)'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{fontSize:42}}>👤</div>
          <h2 style={{fontSize:22,fontWeight:700,color:'#2d7a4f',margin:'8px 0 4px'}}>본인을 선택해 주세요</h2>
          <p style={{color:'#9ca3af',fontSize:13,margin:0}}>이름 검색 또는 목록에서 선택하세요</p>
        </div>
        <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="이름 검색..." style={{width:'100%',padding:'12px 16px',borderRadius:12,border:'2px solid #d1d5db',fontSize:15,outline:'none',marginBottom:12,transition:'border .2s'}} onFocus={e=>e.target.style.borderColor='#5bc490'} onBlur={e=>e.target.style.borderColor='#d1d5db'}/>
        {STAFF.length===0?(
          <div style={{textAlign:'center',padding:'28px 0',color:'#f59e0b',fontSize:14,background:'#fffbeb',borderRadius:12,border:'1px solid #fde68a'}}>
            ⚠️ STAFF 배열이 비어 있습니다.<br/>index.html 상단의 STAFF 배열에 명단을 입력해 주세요.
          </div>
        ):(
          <div style={{maxHeight:340,overflowY:'auto',display:'flex',flexDirection:'column',gap:5}}>
            {list.length===0&&<div style={{textAlign:'center',color:'#9ca3af',padding:16,fontSize:14}}>검색 결과가 없습니다.</div>}
            {list.map(n=>(
              <button key={n} disabled={loading} onClick={()=>onSelect(n)} style={{padding:'11px 16px',borderRadius:11,border:'1.5px solid #e5e7eb',background:'#fff',fontSize:14,cursor:'pointer',textAlign:'left',fontWeight:500,transition:'all .15s',opacity:loading?.6:1}} onMouseEnter={e=>{e.currentTarget.style.background='#f0fdf4';e.currentTarget.style.borderColor='#5bc490';}} onMouseLeave={e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.borderColor='#e5e7eb';}}>
                {n}
              </button>
            ))}
          </div>
        )}
        {loading&&<div style={{textAlign:'center',marginTop:16,color:'#2d7a4f',fontSize:14,fontWeight:600}}>🌱 불러오는 중...</div>}
      </div>
      <div className="fixed-footer">Supported by 밀알디아코니아연구소</div>
    </div>
  );
}

/* ──────────── INBOX MODAL ──────────── */
function InboxModal({inbox,onClose}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.48)',display:'flex',alignItems:'flex-end',zIndex:300}} onClick={onClose}>
      <div className="glass pop" style={{width:'100%',maxWidth:480,margin:'0 auto',maxHeight:'82vh',borderRadius:'22px 22px 0 0',padding:'22px 18px 50px',overflowY:'auto',boxShadow:'0 -8px 40px rgba(0,0,0,.18)'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <h3 style={{margin:0,fontSize:20,fontWeight:700,color:'#2d7a4f'}}>💌 받은 쪽지함</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'#9ca3af',lineHeight:1}}>✕</button>
        </div>
        {inbox.length===0?(
          <div style={{textAlign:'center',padding:'40px 20px',color:'#9ca3af'}}>
            <div style={{fontSize:44,marginBottom:8}}>📭</div>
            <p style={{fontSize:14,lineHeight:1.7}}>아직 받은 쪽지가 없어요.<br/>첫 번째 감사 쪽지를 기다리고 있어요!</p>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {inbox.map((n,i)=>(
              <div key={i} style={{background:'rgba(255,255,255,.92)',borderRadius:16,padding:'14px 16px',border:'1px solid #d1fae5',boxShadow:'0 2px 8px rgba(45,122,79,.07)'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <span style={{fontWeight:700,color:'#2d7a4f',fontSize:14}}>💚 {n.from}</span>
                  <span style={{fontSize:11,color:'#9ca3af'}}>{n.date}</span>
                </div>
                {n.templates&&n.templates.split(',').filter(t=>t.trim()).map((t,j)=>(
                  <div key={j} style={{fontSize:12,color:'#374151',background:'#f0fdf4',borderRadius:8,padding:'5px 10px',marginBottom:4}}>✓ {t.trim()}</div>
                ))}
                {n.message&&<p style={{margin:'8px 0 0',fontSize:13,color:'#374151',fontStyle:'italic',borderTop:'1px solid #e5e7eb',paddingTop:8}}>"{n.message}"</p>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ──────────── WRITE SCREEN ──────────── */
function WriteScreen({user,onSend,onBack,loading}){
  const [recv,setRecv]=useState('');
  const [srch,setSrch]=useState('');
  const [sels,setSels]=useState([]);
  const [msg,setMsg]=useState('');
  const others=(srch?STAFF.filter(n=>n!==user&&n.includes(srch)):STAFF.filter(n=>n!==user)).slice(0,30);
  const toggle=t=>setSels(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const canSend=recv&&(sels.length>0||msg.trim());
  return(
    <div style={{minHeight:'100vh',padding:'20px 16px 100px'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18,maxWidth:480,margin:'0 auto 18px'}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,.82)',border:'1px solid #e5e7eb',borderRadius:11,padding:'9px 14px',cursor:'pointer',fontSize:18,lineHeight:1}}>←</button>
        <h2 style={{margin:0,fontSize:20,fontWeight:700,color:'#2d7a4f'}}>💌 감사 쪽지 쓰기</h2>
      </div>
      <div className="glass fade" style={{borderRadius:22,padding:22,maxWidth:480,margin:'0 auto',boxShadow:'0 4px 24px rgba(45,122,79,.13)'}}>
        {/* 받는 분 */}
        <div style={{marginBottom:18}}>
          <label style={{fontSize:13,fontWeight:700,color:'#374151',display:'block',marginBottom:8}}>📮 받는 분</label>
          {!recv?(
            <>
              <input type="text" value={srch} onChange={e=>setSrch(e.target.value)} placeholder="이름 검색..." style={{width:'100%',padding:'10px 14px',borderRadius:11,border:'2px solid #d1d5db',fontSize:14,outline:'none',marginBottom:8,transition:'border .2s'}} onFocus={e=>e.target.style.borderColor='#5bc490'} onBlur={e=>e.target.style.borderColor='#d1d5db'}/>
              <div style={{maxHeight:180,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>
                {others.map(n=>(
                  <button key={n} onClick={()=>setRecv(n)} style={{padding:'10px 14px',borderRadius:10,border:'1.5px solid #e5e7eb',background:'#fff',fontSize:13,cursor:'pointer',textAlign:'left',fontWeight:500,transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.background='#f0fdf4';e.currentTarget.style.borderColor='#5bc490';}} onMouseLeave={e=>{e.currentTarget.style.background='#fff';e.currentTarget.style.borderColor='#e5e7eb';}}>
                    {n}
                  </button>
                ))}
                {others.length===0&&srch&&<div style={{textAlign:'center',color:'#9ca3af',fontSize:13,padding:12}}>검색 결과가 없습니다.</div>}
              </div>
            </>
          ):(
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 14px',background:'#f0fdf4',borderRadius:11,border:'2px solid #5bc490'}}>
              <span style={{fontWeight:700,color:'#2d7a4f',fontSize:15}}>💚 {recv}</span>
              <button onClick={()=>setRecv('')} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:20,lineHeight:1}}>✕</button>
            </div>
          )}
        </div>
        {recv&&<>
          {/* 템플릿 */}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:13,fontWeight:700,color:'#374151',display:'block',marginBottom:10}}>
              ✅ 감사 메시지 <span style={{color:'#9ca3af',fontWeight:400,fontSize:12}}>(복수 선택 가능)</span>
            </label>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {TMPLS.map((t,i)=>(
                <div key={i} className="chk-wrap">
                  <input type="checkbox" id={`t${i}`} checked={sels.includes(t)} onChange={()=>toggle(t)}/>
                  <label htmlFor={`t${i}`}>
                    <div className="chk-box">{sels.includes(t)&&<span style={{color:'#fff',fontSize:11,fontWeight:800}}>✓</span>}</div>
                    <span style={{fontSize:13,color:'#374151',lineHeight:1.55}}>{t}</span>
                  </label>
                </div>
              ))}
            </div>
          </div>
          {/* 서술형 */}
          <div style={{marginBottom:22}}>
            <label style={{fontSize:13,fontWeight:700,color:'#374151',display:'block',marginBottom:8}}>
              ✍️ 직접 쓰기 <span style={{color:'#9ca3af',fontWeight:400,fontSize:12}}>(선택)</span>
            </label>
            <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="따뜻한 마음을 직접 전해보세요 💚" rows={3} style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'2px solid #d1d5db',fontSize:14,outline:'none',resize:'none',lineHeight:1.65,transition:'border .2s',fontFamily:'inherit'}} onFocus={e=>e.target.style.borderColor='#5bc490'} onBlur={e=>e.target.style.borderColor='#d1d5db'}/>
          </div>
          <button className="btn-g" onClick={()=>onSend({recv,sels,msg})} disabled={!canSend||loading} style={{width:'100%',padding:16,borderRadius:14,fontSize:16,fontWeight:700}}>
            {loading?'전송 중... 🌱':'💌 감사 쪽지 보내기'}
          </button>
        </>}
      </div>
      <div className="fixed-footer">Supported by 밀알디아코니아연구소</div>
    </div>
  );
}

/* ──────────── MAIN SCREEN ──────────── */
function MainScreen({user,ud,onWrite,onInbox,onLogout}){
  const {remainCount=0,temperature=BASE_T,inbox=[]}=ud||{};
  const unread=inbox.length;
  const rewardInfo=()=>{
    if(temperature>=100)return{icon:'🌴',text:'1시간 연차 달성! 🎉',col:'#d1fae5'};
    if(temperature>=70)return{icon:'☕',text:'커피 쿠폰 달성! 🎉',col:'#fef3c7'};
    const next=temperature<70?70:100;
    return{icon:'🔥',text:`다음 보상까지 ${(next-temperature).toFixed(1)}°C`,col:'#f0fdf4'};
  };
  const ri=rewardInfo();
  return(
    <div style={{minHeight:'100vh',padding:'22px 16px 100px'}}>
      <div style={{maxWidth:480,margin:'0 auto'}}>
        {/* 헤더 */}
        <div className="glass fade" style={{borderRadius:22,padding:'22px 24px',marginBottom:14,boxShadow:'0 6px 28px rgba(45,122,79,.14)',textAlign:'center'}}>
          <div style={{fontSize:46,lineHeight:1,marginBottom:4}}>🌱</div>
          <h1 style={{margin:0,fontSize:30,fontWeight:800,color:'#2d7a4f',letterSpacing:-.5}}>감사해U</h1>
          <p style={{margin:'4px 0 14px',color:'#6b7280',fontSize:12}}>밀알복지재단 교육문화팀</p>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <span style={{background:'#f0fdf4',color:'#2d7a4f',padding:'5px 16px',borderRadius:20,fontSize:13,fontWeight:600,border:'1.5px solid #a7f3d0'}}>👋 {user}님 안녕하세요!</span>
            <button onClick={onLogout} style={{background:'none',border:'1px solid #e5e7eb',borderRadius:8,padding:'5px 11px',fontSize:12,color:'#9ca3af',cursor:'pointer'}}>변경</button>
          </div>
        </div>

        {/* 온도계 카드 */}
        <div className="glass fade" style={{borderRadius:22,padding:'22px 20px',marginBottom:14,boxShadow:'0 4px 22px rgba(45,122,79,.12)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
            <span style={{fontSize:14,fontWeight:700,color:'#2d7a4f'}}>🌡️ 나의 감사 온도</span>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:20}}>
            <Thermometer temp={temperature}/>
            <div style={{flex:1}}>
              <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:temperature>=70?'#fef9c3':'#f9fafb',borderRadius:11,border:`1.5px solid ${temperature>=70?'#fbbf24':'#e5e7eb'}`}}>
                  <span style={{fontSize:20}}>☕</span>
                  <div><div style={{fontSize:12,fontWeight:700,color:'#374151'}}>70°C</div><div style={{fontSize:11,color:'#6b7280'}}>커피 쿠폰</div></div>
                  {temperature>=70&&<span style={{marginLeft:'auto',fontSize:11,color:'#d97706',fontWeight:700}}>달성!</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:temperature>=100?'#dcfce7':'#f9fafb',borderRadius:11,border:`1.5px solid ${temperature>=100?'#5bc490':'#e5e7eb'}`}}>
                  <span style={{fontSize:20}}>🌴</span>
                  <div><div style={{fontSize:12,fontWeight:700,color:'#374151'}}>100°C</div><div style={{fontSize:11,color:'#6b7280'}}>1시간 연차</div></div>
                  {temperature>=100&&<span style={{marginLeft:'auto',fontSize:11,color:'#2d7a4f',fontWeight:700}}>달성!</span>}
                </div>
              </div>
              <div style={{padding:'9px 12px',background:ri.col,borderRadius:11,fontSize:12,fontWeight:600,color:'#2d7a4f',textAlign:'center'}}>
                {ri.icon} {ri.text}
              </div>
            </div>
          </div>
        </div>

        {/* 공지 배너 */}
        <div className="glass" style={{borderRadius:16,padding:'13px 18px',marginBottom:14,background:'linear-gradient(135deg,rgba(91,196,144,.18),rgba(45,122,79,.1))',border:'1px solid rgba(91,196,144,.35)',fontSize:13,color:'#374151',textAlign:'center',lineHeight:1.7}}>
          ☕ 밀알디아코니아연구소에서 지급할 커피가 머지않았습니다!<br/>
          <span style={{color:'#2d7a4f',fontWeight:700}}>오늘도 감사의 온도를 높여보세요 🌡️</span>
        </div>

        {/* 버튼들 */}
        <div style={{display:'flex',gap:12}}>
          <button className="btn-g" onClick={onWrite} disabled={remainCount===0} style={{flex:1,padding:'18px 12px',borderRadius:17,fontSize:15,fontWeight:700,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:26}}>💌</span>
            <span>감사 쪽지 쓰기</span>
            <span style={{fontSize:11,opacity:.85,fontWeight:500}}>오늘 남은 기회: {remainCount}회</span>
          </button>
          <button onClick={onInbox} style={{width:80,padding:'18px 10px',borderRadius:17,border:'2px solid #5bc490',background:'#fff',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,position:'relative',transition:'all .2s',flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.background='#f0fdf4'} onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
            <span style={{fontSize:26}}>📬</span>
            <span style={{fontSize:12,fontWeight:700,color:'#2d7a4f'}}>쪽지함</span>
            {unread>0&&<span style={{position:'absolute',top:7,right:7,background:'#ef4444',color:'#fff',borderRadius:'50%',width:19,height:19,fontSize:10,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread>99?'99+':unread}</span>}
          </button>
        </div>
      </div>
      <div className="fixed-footer">Supported by 밀알디아코니아연구소</div>
    </div>
  );
}

/* ──────────── SUCCESS MODAL ──────────── */
function SuccessModal({recv,onClose}){
  useEffect(()=>{launchConfetti();},[]);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:20}}>
      <div className="glass pop" style={{borderRadius:26,padding:'44px 32px',textAlign:'center',maxWidth:320,width:'100%',boxShadow:'0 16px 56px rgba(0,0,0,.22)'}}>
        <div style={{fontSize:64,marginBottom:10}}>🎉</div>
        <h3 style={{fontSize:23,fontWeight:800,color:'#2d7a4f',margin:'0 0 8px'}}>전달 완료!</h3>
        <p style={{color:'#374151',fontSize:15,margin:'0 0 6px'}}>
          <strong style={{color:'#2d7a4f'}}>{recv}</strong>님께<br/>따뜻한 감사가 전해졌어요 💚
        </p>
        <p style={{color:'#6b7280',fontSize:13,margin:'0 0 26px'}}>보내는 분, 받는 분 모두 +1°C 🌡️</p>
        <button className="btn-g" onClick={onClose} style={{width:'100%',padding:15,borderRadius:13,fontSize:15,fontWeight:700}}>확인</button>
      </div>
    </div>
  );
}

/* ──────────── APP ──────────── */
function App(){
  const [screen,setScreen]=useState('pw'); // pw|login|main|write
  const [user,setUser]=useState(null);
  const [ud,setUd]=useState(null);
  const [loading,setLoading]=useState(false);
  const [inbox,setInbox]=useState(false);
  const [success,setSuccess]=useState(null);
  const [errMsg,setErrMsg]=useState('');

  const fetchUd=async name=>{
    setLoading(true);
    try{
      const r=await fetch(`${SHEET_URL}?action=getUser&name=${encodeURIComponent(name)}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setUd(d);
    }catch(e){
      setErrMsg('서버 연결 실패. SHEET_URL을 확인하거나 잠시 후 다시 시도해 주세요.');
      console.error(e);
    }finally{setLoading(false);}
  };

  const handleSelect=async name=>{
    setUser(name);
    await fetchUd(name);
    setScreen('main');
  };

  const handleSend=async({recv,sels,msg})=>{
    setLoading(true);
    try{
      const r=await fetch(SHEET_URL,{
        method:'POST',
        headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({sender:user,receiver:recv,templates:sels,message:msg})
      });
      const d=await r.json();
      if(!d.success)throw new Error(d.error||'전송에 실패했습니다.');
      setUd(prev=>({...prev,temperature:d.senderTemp,remainCount:d.remainCount}));
      setSuccess(recv);
      setScreen('main');
    }catch(e){
      setErrMsg(e.message||'전송 중 오류가 발생했습니다.');
    }finally{setLoading(false);}
  };

  return(
    <div style={{maxWidth:480,margin:'0 auto'}}>
      {/* 오류 토스트 */}
      {errMsg&&(
        <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',background:'#fef2f2',border:'1px solid #fca5a5',color:'#dc2626',padding:'10px 18px',borderRadius:12,fontSize:13,zIndex:600,maxWidth:340,textAlign:'center',boxShadow:'0 4px 16px rgba(0,0,0,.1)',display:'flex',alignItems:'center',gap:10}}>
          <span>⚠️ {errMsg}</span>
          <button onClick={()=>setErrMsg('')} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#9ca3af'}}>✕</button>
        </div>
      )}

      {screen==='pw'&&<PasswordScreen onOk={()=>setScreen('login')}/>}
      {screen==='login'&&<LoginScreen onSelect={handleSelect} loading={loading}/>}
      {screen==='main'&&ud&&(
        <MainScreen user={user} ud={ud} onWrite={()=>setScreen('write')} onInbox={()=>setInbox(true)} onLogout={()=>{setUser(null);setUd(null);setScreen('login');}}/>
      )}
      {screen==='write'&&(
        <WriteScreen user={user} onSend={handleSend} onBack={()=>setScreen('main')} loading={loading}/>
      )}
      {inbox&&ud&&<InboxModal inbox={ud.inbox||[]} onClose={()=>setInbox(false)}/>}
      {success&&<SuccessModal recv={success} onClose={()=>setSuccess(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
